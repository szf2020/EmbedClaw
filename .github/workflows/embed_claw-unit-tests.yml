name: EmbedClaw Build Checks

on:
  pull_request:
    paths:
      - ".github/workflows/embed_claw-unit-tests.yml"
      - "CMakeLists.txt"
      - "sdkconfig.defaults"
      - "sdkconfig.defaults.*"
      - "partitions.csv"
      - "main/**"
      - "components/**"
      - "scripts/run_unit_tests.sh"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/embed_claw-unit-tests.yml"
      - "CMakeLists.txt"
      - "sdkconfig.defaults"
      - "sdkconfig.defaults.*"
      - "partitions.csv"
      - "main/**"
      - "components/**"
      - "scripts/run_unit_tests.sh"
  workflow_dispatch:

jobs:
  build-project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: v5.5.2

      - name: Use sdkconfig.defaults
        run: cp sdkconfig.defaults.esp32s3 sdkconfig.defaults

      - name: Set target esp32s3
        run: idf.py set-target esp32s3

      - name: Build project firmware
        run: idf.py build

      - name: Upload project build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-build
          if-no-files-found: ignore
          path: |
            build/*.bin
            build/bootloader/*.bin
            build/partition_table/*.bin
            build/flasher_args.json

  build-unit-test-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: v5.5.2

      - name: Build unit-test-app
        run: ./scripts/run_unit_tests.sh build

      - name: Upload unit-test build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-app-build
          if-no-files-found: ignore
          path: |
            build/unit-test-app-*/unit-test-app.bin
            build/unit-test-app-*/bootloader/bootloader.bin
            build/unit-test-app-*/partition_table/partition-table.bin
            build/unit-test-app-*/flasher_args.json
